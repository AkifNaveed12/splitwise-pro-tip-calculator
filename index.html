<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplitWise Pro — Tip Calculator & Bill Splitter</title>
  
  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- App Container -->
  <div class="app-container">
    
    <!-- Header Section -->
    <header class="app-header">
      <div class="logo-container">
        <!-- Logo SVG matching TipSplit fintech style -->
        <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="2" y="5" width="20" height="14" rx="3" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <circle cx="7" cy="12" r="2" fill="currentColor"/>
          <path d="M15 9H18M15 12H18M15 15H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">TipSplit</span>
      </div>
    </header>

    <!-- Main Content Section -->
    <main class="main-content">
      <div class="calculator-card">
        
        <!-- Input Panel -->
        <section class="input-panel" aria-label="Input details">
          
          <!-- Bill Amount -->
          <div class="input-group">
            <div class="label-row">
              <label for="bill-input" class="input-label">Bill</label>
              <span class="error-message" id="bill-error" aria-live="polite"></span>
            </div>
            <div class="input-wrapper">
              <span class="input-icon" aria-hidden="true">$</span>
              <input 
                type="text" 
                id="bill-input" 
                class="text-input" 
                placeholder="0" 
                inputmode="decimal"
                aria-describedby="bill-error"
                autocomplete="off"
              >
            </div>
          </div>

          <!-- Tip Selection -->
          <div class="input-group">
            <div class="label-row">
              <span class="input-label">Select Tip %</span>
              <span class="error-message" id="tip-error" aria-live="polite"></span>
            </div>
            <div class="tip-grid" role="group" aria-label="Select Tip Percentage">
              <button type="button" class="tip-preset-btn" data-tip="10">10%</button>
              <button type="button" class="tip-preset-btn" data-tip="15">15%</button>
              <button type="button" class="tip-preset-btn" data-tip="20">20%</button>
              <button type="button" class="tip-preset-btn" data-tip="25">25%</button>
              <button type="button" class="tip-preset-btn" data-tip="50">50%</button>
              <div class="custom-tip-wrapper">
                <input 
                  type="text" 
                  id="custom-tip-input" 
                  class="custom-tip-input" 
                  placeholder="Custom" 
                  inputmode="decimal"
                  aria-label="Custom Tip Percentage"
                  aria-describedby="tip-error"
                  autocomplete="off"
                >
              </div>
            </div>
          </div>

          <!-- Number of People -->
          <div class="input-group">
            <div class="label-row">
              <label for="people-input" class="input-label">Number of People</label>
              <span class="error-message" id="people-error" aria-live="polite"></span>
            </div>
            <div class="input-wrapper">
              <!-- Person SVG Icon -->
              <span class="input-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <input 
                type="text" 
                id="people-input" 
                class="text-input" 
                placeholder="1" 
                inputmode="numeric"
                aria-describedby="people-error"
                autocomplete="off"
              >
            </div>
          </div>

        </section>

        <!-- Results Panel -->
        <section class="results-panel" aria-label="Calculation results">
          <div class="results-content">
            
            <!-- Tip Amount per Person -->
            <div class="result-row">
              <div class="result-label-group">
                <span class="result-title">Tip Amount</span>
                <span class="result-subtitle">/ person</span>
              </div>
              <div class="result-value-container">
                <span class="result-value" id="tip-amount-result" aria-live="polite">$0.00</span>
              </div>
            </div>

            <!-- Total per Person -->
            <div class="result-row">
              <div class="result-label-group">
                <span class="result-title">Total</span>
                <span class="result-subtitle">/ person</span>
              </div>
              <div class="result-value-container">
                <span class="result-value" id="total-result" aria-live="polite">$0.00</span>
              </div>
            </div>

          </div>
          
          <!-- Reset Button -->
          <button type="button" id="reset-button" class="reset-button" disabled>RESET</button>
        </section>

      </div>
    </main>

    <!-- Footer Section -->
    <footer class="app-footer">
      <div class="footer-links">
        <a href="#" class="footer-link">Privacy Policy</a>
        <a href="#" class="footer-link">Terms of Service</a>
        <a href="#" class="footer-link">Help</a>
      </div>
      <p class="footer-copyright">&copy; 2026 TipSplit Fintech. All rights reserved.</p>
    </footer>

  </div>

  <!-- Main JavaScript File -->
  <script src="script.js"></script>
</body>
</html>
